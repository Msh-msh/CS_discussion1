<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>封面</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .cover-slide {
      background: radial-gradient(ellipse at center, var(--primary) 0%, var(--primary-dark) 100%);
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .cover-title {
      font-size: clamp(48px, 6vw, 84px);
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2vh;
      animation: scaleIn 0.8s ease forwards;
    }
    .cover-subtitle {
      font-size: clamp(24px, 3vw, 42px);
      color: var(--white);
      margin-bottom: 4vh;
      opacity: 0;
      animation: fadeIn 0.8s ease 0.3s forwards;
    }
    .cover-info {
      font-size: clamp(18px, 2.2vw, 32px);
      color: rgba(255, 255, 255, 0.8);
      opacity: 0;
      animation: slideInUp 0.8s ease 0.6s forwards;
    }
  </style>
</head>
<body>
  <div class="slide cover-slide">
    <h1 class="cover-title">计算机系统讨论课</h1>
    <h2 class="cover-subtitle">第三组</h2>
    <p class="cover-info">图灵完备性 · 指令集对比 · 中断机制与扩展</p>
  </div>
</body>
</html>
