<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>3.4 对现有 vspm 的改写流程</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .flow-container {
      display: flex;
      flex-direction: column;
      gap: 3vh;
      margin-top: 2vh;
    }
    .flow-step {
      display: flex;
      align-items: flex-start;
      gap: 2vw;
    }
    .step-number {
      flex-shrink: 0;
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--accent), #f59e0b);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(24px, 3vw, 36px);
      font-weight: 800;
      color: var(--primary-dark);
    }
    .step-content {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 2vh 2vw;
      border-left: 3px solid var(--accent);
    }
    .step-content h3 {
      color: var(--accent);
      font-size: clamp(18px, 2vw, 26px);
      margin-bottom: 1vh;
    }
    .step-content p {
      font-size: clamp(14px, 1.5vw, 20px);
      line-height: 1.6;
      margin: 0;
    }
    .note-box {
      background: rgba(56, 189, 248, 0.1);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 2vh 2vw;
      margin-top: 2vh;
    }
    .note-box p {
      font-size: clamp(14px, 1.5vw, 18px);
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="slide">
    <h1 class="slide-title">3.4 对现有 vspm 的改写流程</h1>
    <div class="content animate-slide-up">
      <div class="flow-container">
        <div class="flow-step delay-1">
          <div class="step-number">1</div>
          <div class="step-content">
            <h3>反编译</h3>
            <p>对现有 vspm 可执行文件进行反编译，恢复出可修改的源码。</p>
          </div>
        </div>
        <div class="flow-step delay-2">
          <div class="step-number">2</div>
          <div class="step-content">
            <h3>扩展指令体系</h3>
            <p>在原有指令体系中加入 <code>int</code>（interrupt）相关能力，并补上中断触发、现场保护与返回流程。</p>
          </div>
        </div>
        <div class="flow-step delay-3">
          <div class="step-number">3</div>
          <div class="step-content">
            <h3>重新编译</h3>
            <p>重新编译为新的可执行文件，用于课堂演示。</p>
          </div>
        </div>
      </div>
      <div class="note-box delay-4">
        <p><strong>说明：</strong>演示重点是中断机制可运行，具体改写细节见 <code>INT.md</code>。</p>
      </div>
    </div>
  </div>
</body>
</html>
