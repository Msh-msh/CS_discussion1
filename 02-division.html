<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>小组分工</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .grid-layout {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 3vh 3vw;
      width: 100%;
      margin-top: 2vh;
    }
    .member-card {
      background: rgba(255, 255, 255, 0.05);
      border-left: 4px solid var(--accent);
      padding: 2vh 2vw;
      border-radius: 8px;
    }
    .member-card h3 {
      color: var(--accent);
      font-size: clamp(20px, 2vw, 28px);
      margin-bottom: 1vh;
    }
    .member-card p {
      font-size: clamp(14px, 1.5vw, 20px);
      line-height: 1.6;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="slide">
    <h1 class="slide-title">小组分工</h1>
    <div class="content animate-fade">
      <div class="grid-layout">
        <div class="member-card delay-1">
          <h3>吴宇珂</h3>
          <p>提出了vspm图灵完备性的核心概念并解决了相关的理论论证。</p>
        </div>
        <div class="member-card delay-2">
          <h3>毛世航</h3>
          <p>解决了vspm与x86-64指令集的对比分析与数据收集并负责幻灯片的构建</p>
        </div>
        <div class="member-card delay-3">
          <h3>刘宇希</h3>
          <p>提出了复杂指令集对算力提升的意义并解决了具体的指令案例（VADDPS）分析。</p>
        </div>
        <div class="member-card delay-4">
          <h3>谢添羽</h3>
          <p>解决了CPU中断机制原理及其在现代计算机中的必要性分析。</p>
        </div>
        <div class="member-card delay-5" style="grid-column: span 2;">
          <h3>缪朴奂</h3>
          <p>提出了vspm扩展中断机制的硬件构想，并完成了与对现有vspm中断机制的扩充。</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
