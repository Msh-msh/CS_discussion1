<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>结束</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .end-slide {
      background: radial-gradient(ellipse at center, var(--primary) 0%, var(--primary-dark) 100%);
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .end-title {
      font-size: clamp(64px, 8vw, 120px);
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 2vh;
      animation: scaleIn 0.8s ease forwards;
    }
    .end-subtitle {
      font-size: clamp(24px, 3vw, 42px);
      color: var(--white);
      margin-bottom: 4vh;
      opacity: 0;
      animation: fadeIn 0.8s ease 0.3s forwards;
    }
  </style>
</head>
<body>
  <div class="slide end-slide">
    <h1 class="end-title">Thanks !</h1>
    <h2 class="end-subtitle">感谢观看 / 欢迎提问</h2>
  </div>
</body>
</html>
